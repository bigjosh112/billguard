name: Keep Backend Warm

# Pings Railway API every 10 min to reduce cold starts during hackathon judging.
# Set repo variable: Settings → Secrets and variables → Actions → BILLGUARD_API_URL
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping BillGuard API
        env:
          API_URL: ${{ vars.BILLGUARD_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "Set BILLGUARD_API_URL in repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -sf --max-time 120 "${API_URL}/health" | grep -q BillGuard && echo "✓ Backend awake"
